spring:
  application:
    name: RentACar
  
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Mail Configuration for Production
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

  # Thymeleaf for Email Templates
  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    validate-on-migrate: true

# Application Configuration
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  encryption:
    key: ${ENCRYPTION_KEY}
  storage:
    type: ${STORAGE_TYPE:s3}
    upload-dir: ${STORAGE_LOCAL_PATH:/tmp/rentacar-uploads}
    s3:
      bucket-name: ${S3_BUCKET_NAME:rentacar-images}
      region: ${S3_REGION:eu-central-1}
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
  mail:
    from: ${MAIL_FROM:noreply@rentacar.com}
    from-name: ${MAIL_FROM_NAME:RentACar}

# Logging Configuration
logging:
  level:
    org.springframework.web: WARN
    com.rentacar: INFO
    org.flywaydb: INFO

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
