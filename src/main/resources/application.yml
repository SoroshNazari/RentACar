spring:
  application:
    name: RentACar
  # H2 als Standard-Datenbank (dateibasiert - Daten bleiben erhalten)
  datasource:
    url: jdbc:h2:file:./data/rentacar;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Sicherheitskonfiguration
app:
  security:
    encryption:
      # AES-256 Key (Base64-kodiert, 32 Bytes)
      # WICHTIG: In Produktion aus Secrets Manager laden!
      key: ${ENCRYPTION_KEY:dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==}
    jwt:
      # JWT Secret (Base64-kodiert, mindestens 256 Bit)
      # WICHTIG: In Produktion aus Secrets Manager laden!
      secret: ${JWT_SECRET:dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3ItcmVudGFjYXItYXBwbGljYXRpb24tMjU2LWJpdA==}
      # Token-Gültigkeit: 24 Stunden (in Millisekunden)
      expiration: ${JWT_EXPIRATION:86400000}
  docker:
    compose:
      enabled: false
  # Mock-Services für Entwicklung
  mock:
    storage: true

logging:
  level:
    org.springframework.web: INFO
    com.rentacar: DEBUG

# Actuator Endpoints für Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
