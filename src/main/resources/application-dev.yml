spring:
  application:
    name: RentACar
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rentacar}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate  # Changed from update to validate for Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Mail Configuration for Development (Console Output)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # Thymeleaf for Email Templates
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

# Application Security Configuration
app:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits-long}
      expiration: ${JWT_EXPIRATION:86400000}  # 24 hours
    encryption:
      key: ${ENCRYPTION_KEY:dev-encryption-key-32-chars!!}
  storage:
    type: ${STORAGE_TYPE:local}
    upload-dir: ${STORAGE_LOCAL_PATH:./uploads}
  mail:
    from: ${MAIL_FROM:noreply@rentacar.local}
    from-name: ${MAIL_FROM_NAME:RentACar Dev}

# Logging Configuration
logging:
  level:
    org.springframework.web: INFO
    com.rentacar: DEBUG
    org.flywaydb: INFO

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway
  endpoint:
    health:
      show-details: when-authorized
